# VaultAuth for canvas-api — uses the default service account in the mathtrail namespace.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: canvas-api-vault-auth
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: canvas-api-vault-role
    serviceAccountName: canvas-api
---
# canvas-api secrets: Centrifugo API key and HMAC key for JWT generation.
#
# Vault path: secret/data/canvas-api/secrets
# Required keys:
#   centrifugo_api_key  — must match centrifugo-secrets.api_key
#   centrifugo_hmac_key — must match centrifugo-secrets.token_hmac_secret_key
#
# To create in Vault (same values as centrifugo secrets):
#   vault kv put secret/canvas-api/secrets \
#     centrifugo_api_key=<same as centrifugo api_key> \
#     centrifugo_hmac_key=<same as centrifugo token_hmac_secret_key>
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: canvas-api-secrets
spec:
  type: kv-v2
  mount: secret
  path: canvas-api/secrets
  destination:
    name: canvas-api-secrets
    create: true
  refreshAfter: 1h
  vaultAuthRef: canvas-api-vault-auth
---
# AutoMQ SCRAM-SHA-512 credentials for canvas-api Kafka producer/consumer.
#
# Vault path: secret/data/local/streaming-automq-canvas-api
# Required keys: username, password
#
# Create in Vault and register the SCRAM user in AutoMQ:
#   vault kv put secret/local/streaming-automq-canvas-api \
#     username=canvas-api password=<generated-password>
#   # Then register SCRAM user in AutoMQ via kafka-configs.sh
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: automq-canvas-api-scram
spec:
  type: kv-v2
  mount: secret
  path: local/streaming-automq-canvas-api
  destination:
    name: automq-canvas-api-scram
    create: true
  refreshAfter: 1h
  vaultAuthRef: canvas-api-vault-auth
