replicaCount: 1

image:
  repository: ""   # set by skaffold via setValueTemplates
  tag: ""

service:
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

probes:
  startup:
    path: /health/startup
    failureThreshold: 30
    periodSeconds: 5
  liveness:
    path: /health/liveness
    periodSeconds: 10
  readiness:
    path: /health/ready
    periodSeconds: 10
